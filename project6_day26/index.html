<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="header">

            <!-- Screen -->

            <div id="screen">Let's Play!</div>
        </div>

        <div id="content">

            <!-- PLAYER 1 -->

            <div id="player_one">

                

                    <img src="./1.png" alt="player1" id="img1" style="height: 250px; ">
                    <div id="p1">PLAYER 1</div>
                    <div id="zero"><img src="./circle.png" alt="zero"  style="height: 150px; width: 150px;"></div>

            </div> 


            <!-- GAME BOARD -->

            <div id="game_board">
                <div id="0" class="cell"></div>
                <div id="1" class="cell"></div>
                <div id="2" class="cell"></div>
                <div id="3" class="cell"></div>
                <div id="4" class="cell"></div>
                <div id="5" class="cell"></div>
                <div id="6" class="cell"></div>
                <div id="7" class="cell"></div>
                <div id="8" class="cell"></div>
            </div>


            <!-- PLAYER 2 -->
            <div id="player_two">
                <img src="./2.png" alt="player2" id="img2" style="height: 250px; ">
                <div id="p2">PLAYER 2</div>
                <div id="cross"><img src="./cross.png" alt="cross"  style="height: 150px; width: 150px;"></div>

            </div>

        </div>

        <!-- RESET -->

        <div id="footer">

            <button id="reset">RESET</button>
        </div>
    </div>

    <script src="./first.js"></script>
</body>
</html>
