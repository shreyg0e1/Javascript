<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root">

        <div id="container">

            <div id="display">0</div>
            <div id="boton">
                <div id="row1" class="butt">
                    <button id="clearbtn">C</button>
                    <button class="btn-special"> Del </button>
                    <button class="btn-special">+/-</button>
                    <button id="divideoperator">/</button>
                </div>

                <div id="row2" class="butt">
                    <button id="one">1</button>
                    <button>2</button>
                    <button>3</button>
                    <button id="multioperator">X</button>
                </div>

                <div id="row3" class="butt">
                     <button>4</button>
                     <button>5</button>
                     <button>6</button>
                     <button id="plusoperator">+</button>
                </div>  
            
                <div id="row4" class="butt">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button id="minusoperator">-</button>
                </div>
            
                <div id="row5" class="butt">
                    <button class="btn-special">%</button>
                    <button>0</button>
                    <button>.</button>
                    <button id="equals">=</button>
                </div>
                <div id="symbol">

                </div>
             
            </div>    
        </div>       
    </div>

    <script src="./first.js"></script>
</body>
</html>
