<!-- nod: number of days  -->

 <!-- ddm: day date month -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympic Countdown</title>
</head>
<body style="color: white;">
    
    <div id="root">
        <div id="second">

            <div id="third" class="content">

                <div id="hmdu" class="info">

                </div>

                <div id="summer" class="info">

                </div>

                <div id="address" class="info";>

                    <div id="ddm" class="venue">

                    </div>

                    </div>

                </div>

            </div>

                </div>

                    </div>

                    </div>

                </div>

                    <div id="hours" class="text">

                    </div>

                    <div id="minutes" class="text">

                    </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
