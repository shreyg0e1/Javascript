<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Study Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at center, #012219, #010f0d);
      color: white;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: radial-gradient(circle at center, #012219, #010f0d);
      border-radius: 24px;
      height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #ffffff;
      position: relative;
      box-shadow:
        0 0 0 3px #013b2d,
        0 0 12px #00ffcc,
        0 0 25px rgba(0, 255, 204, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 0 3px #00ffcc,
        0 0 18px #00ffe0,
        0 0 30px rgba(0, 255, 204, 0.4);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border: 2px solid #00ffcc;
      border-radius: 18px;
      opacity: 0.2;
      box-shadow: 0 0 12px #00ffcc;
    }

    .circle-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(0, 255, 204, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      background: radial-gradient(circle at center, #012d22, #010f0d);
      box-shadow: 0 0 16px rgba(0, 255, 204, 0.3);
    }

    .circle-icon::after {
      content: "\25C6";
      color: #00ffcc;
      font-size: 24px;
      opacity: 0.8;
    }

    .card-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0fff8;
      line-height: 1.4;
      text-shadow: 0 0 6px rgba(0, 255, 204, 0.3);
    }

    a.card-link {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <!-- 9 Cards linked to a case-study page -->
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">UNLOCKING<br />NEW MARKETS</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">AGROCHEMICAL<br />TO SPECIALTY</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">BATTERY<br />SOLUTIONS</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">EXPORT<br />TRANSFORMATION</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">CHEMICAL<br />RESTRUCTURE</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">HEALTH &<br />NUTRITION</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">BIO-BASED<br />INNOVATION</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">GREEN ENERGY<br />PIPELINE</div></div></a>
    <a href="case-study.html" class="card-link"><div class="card"><div class="circle-icon"></div><div class="card-text">DOMESTIC<br />DEMAND MAP</div></div></a>
  </div>
</body>
</html>
